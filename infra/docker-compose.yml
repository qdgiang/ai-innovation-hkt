services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: evermind
      POSTGRES_PASSWORD: evermind
      POSTGRES_DB: evermind
    ports:
      - "5432:5432"
    volumes:
      - evermind_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evermind -d evermind"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://evermind:evermind@db:5432/evermind
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    command: sh -c "alembic upgrade head && uvicorn evermind.api.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ../frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: npm run dev

  caddy:
    image: caddy:2-alpine
    profiles: ["prod"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - frontend

volumes:
  evermind_db_data:
  caddy_data:
