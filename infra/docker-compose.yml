name: orgmemory

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: orgmemory
      POSTGRES_PASSWORD: orgmemory
      POSTGRES_DB: orgmemory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orgmemory"]
      interval: 5s
      timeout: 3s
      retries: 10

  # The api service lands in Phase 2 (first Railway deploy window). Until then:
  # local dev runs `make api` (uvicorn) against SQLite or this db.

volumes:
  pgdata:
